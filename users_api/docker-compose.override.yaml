version: "3.5"

services:
    users_api:
        restart: "no"
        ports:
            - "8888:8888"
        volumes:
            - ./:/opt/users_api
        build:
            context: .
            args:
                INSTALL_DEV: ${INSTALL_DEV-true}
    recos_api:
        restart: "no"
        ports:
            - "8880:8880"
        volumes:
            - ./:/opt/movie_recommendations_api
        build:
            context: ../movie_recommendations_api
